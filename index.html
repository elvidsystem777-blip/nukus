<!DOCTYPE html>

    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        
        /* Сайдбар */
        .sidebar { 
            width: 280px; 
            background: white; 
            border-right: 1px solid #ddd;
            height: 100vh;
            overflow-y: auto;
            position: sticky;
            top: 0;
        }
        .sidebar h3 { padding: 20px; margin: 0; background: #1a73e8; color: white; font-size: 18px; }
        .cat-item { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #eee; 
            transition: 0.3s;
            font-size: 14px;
        }
        .cat-item:hover { background: #e8f0fe; }
        .active { color: #1a73e8; font-weight: bold; border-left: 5px solid #1a73e8; background: #e8f0fe; }

        /* Основной контент */
        .main-content { flex-grow: 1; padding: 20px; display: flex; justify-content: center; }
        .calc-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 550px; height: fit-content; }
        
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        .btn-add { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add:hover { background: #218838; }

        .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .res-table th, .res-table td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .res-table th { background: #f8f9fa; color: #555; }
        
        /* Стиль для кнопки удаления X */
        .btn-remove { background: none; border: none; color: #d93025; cursor: pointer; font-weight: bold; font-size: 18px; padding: 0 5px; }
        .btn-remove:hover { color: #a50e0e; }

        .total-box { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; text-align: right; }
        .total-val { font-size: 24px; font-weight: bold; color: #d93025; }
        
        .btn-reset { background: none; border: 1px solid #ccc; color: #999; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; display: block; margin-left: auto; }
        .btn-reset:hover { background: #f8f9fa; color: #666; }
    </style>
</head>

<div class="sidebar" id="sidebar">
    <h3>Разделы</h3>
</div>

<div class="main-content">
    <div class="calc-card">
        <h2>Смета ELVID</h2>
        
        <div class="row">
            <label>🔍 Поиск товара:</label>
            <input type="text" id="searchInput" placeholder="Введите название для поиска по всем категориям..." oninput="filterProducts()">
        </div>

        <div class="row">
            <label>Выберите оборудование:</label>
            <select id="pSelect"></select>
        </div>

        <div class="row">
            <label>Количество (шт):</label>
            <input type="number" id="qInput" value="1" min="1">
        </div>

        <div class="row" style="display: flex; align-items: center; gap: 10px; padding: 5px 0 10px 0;">
            <input type="checkbox" id="serviceCheckbox" style="width: 20px; height: 20px; cursor: pointer;" onchange="renderCart()">
            <label for="serviceCheckbox" style="margin: 0; cursor: pointer; font-size: 14px; color: #1a73e8; font-weight: bold;">+ Услуга "Сервис" (200,000 сум)</label>
        </div>

        <button class="btn-add" onclick="addItem()">➕ Добавить в смету</button>

        <table class="res-table">
            <thead>
                <tr>
                    <th>Товар</th>
                    <th>Кол-во</th>
                    <th>Сумма</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>

        <div class="row" style="border-top: 1px solid #eee; pt-15; margin-top: 20px;">
            <label>👤 Данные клиента:</label>
            <input type="text" id="clientName" placeholder="ФИО клиента" style="margin-bottom: 5px;">
            <input type="text" id="clientPhone" placeholder="+998 00 000 00 00">
        </div>

        <div class="total-box">
            <div style="color: #1a73e8; font-size: 14px; font-weight: bold;">ИТОГО К ОПЛАТЕ:</div>
            <div class="total-val" id="finalSum">0 сум</div>
        </div>
        <button onclick="saveAsPDF()" style="background: #1a73e8; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;">
            📄 Сохранить PDF-отчет

        <button class="btn-reset" onclick="clearAll()">Очистить список</button>
    </div>
</div>

    let cart = [];
    let currentCategory = Object.keys(catalog)[0];

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '<h3>Разделы</h3>';
        Object.keys(catalog).forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-item' + (cat === currentCategory ? ' active' : '');
            div.innerText = cat;
            div.onclick = () => {
                currentCategory = cat;
                document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                document.getElementById('searchInput').value = '';
                updateProductList();
            };
            sidebar.appendChild(div);
        });
    }

    function updateProductList(filteredArr = null) {
        const pSelect = document.getElementById('pSelect');
        pSelect.innerHTML = '';
        const items = filteredArr || catalog[currentCategory];

        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.price;
            opt.dataset.name = item.name;
            opt.text = `${item.name} (${item.price.toLocaleString()} сум)`;
            pSelect.add(opt);
        });
    }

    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        if (term === "") { updateProductList(); return; }

        let globalFiltered = [];
        Object.keys(catalog).forEach(category => {
            catalog[category].forEach(product => {
                if (product.name.toLowerCase().includes(term)) {
                    globalFiltered.push({ name: `[${category}] ${product.name}`, price: product.price });
                }
            });
        });
        updateProductList(globalFiltered);
    }

    function addItem() {
        const s = document.getElementById('pSelect');
        if (s.options.length === 0) return;

        const name = s.options[s.selectedIndex].dataset.name;
        const price = parseFloat(s.value);
        const qty = parseInt(document.getElementById('qInput').value) || 0;

        if (qty > 0) {
            cart.push({ n: name, q: qty, s: price * qty });
            renderCart();
        }
    }

    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        const b = document.getElementById('resBody');
        let h = '', total = 0;

        cart.forEach((i, index) => {
            h += `<tr>
                <td>${i.n}</td>
                <td>${i.q} шт.</td>
                <td>${i.s.toLocaleString()} сум</td>
                <td><button class="btn-remove" onclick="removeItem(${index})">✕</button></td>
            </tr>`;
            total += i.s;
        });

        if (document.getElementById('serviceCheckbox').checked) {
            total += 200000;
            h += `<tr style="background:#fffbe6; font-weight:bold;">
                <td>🛠 Услуга: Сервис</td>
                <td>1</td>
                <td>200,000 сум</td>
                <td></td>
            </tr>`;
        }

        b.innerHTML = h;
        document.getElementById('finalSum').innerText = total.toLocaleString() + " сум";
    }

    function clearAll() {
        if(confirm("Очистить всю смету?")) {
            cart = [];
            document.getElementById('serviceCheckbox').checked = false;
            renderCart();
        }
    }

    renderSidebar();
    updateProductList();
function saveAsPDF() {
    const name = document.getElementById('clientName').value || "Не указан";
    const phone = document.getElementById('clientPhone').value || "Не указан";
    const date = new Date().toLocaleString();
    const total = document.getElementById('finalSum').innerText;

    if (cart.length === 0 && !document.getElementById('serviceCheckbox').checked) {
        alert("Смета пуста!");
        return;
    }

    // Собираем строки таблицы
    let tableRows = '';
    cart.forEach(i => {
        tableRows += `
            <tr>
                <td style="border: 1px solid #000; padding: 8px;">${i.n}</td>
                <td style="border: 1px solid #000; padding: 8px; text-align: center;">${i.q} шт.</td>
                <td style="border: 1px solid #000; padding: 8px; text-align: right;">${i.s.toLocaleString()} сум</td>
            </tr>`;
    });

    if (document.getElementById('serviceCheckbox').checked) {
        tableRows += `
            <tr style="background-color: #f9f9f9; font-weight: bold;">
                <td style="border: 1px solid #000; padding: 8px;">Услуга: Сервис</td>
                <td style="border: 1px solid #000; padding: 8px; text-align: center;">1</td>
                <td style="border: 1px solid #000; padding: 8px; text-align: right;">200,000 сум</td>
            </tr>`;
    }

    // Создаем невидимый контейнер в теле документа
    const printArea = document.createElement('div');
    printArea.id = 'tempPrintArea';
    // Выносим его за пределы экрана, но оставляем в DOM
    printArea.style.position = 'absolute';
    printArea.style.left = '-9999px';
    printArea.style.top = '0';
    printArea.style.width = '170mm'; // Фиксированная ширина для стабильности рендера

    printArea.innerHTML = `
        <div style="padding: 10px; font-family: Arial, sans-serif; color: #000;">
            <h1 style="text-align: center; color: #1a73e8;">СМЕТА ELVID</h1>
            <div style="margin-bottom: 20px; border-bottom: 2px solid #1a73e8; padding-bottom: 10px;">
                <p><strong>Дата:</strong> ${date}</p>
                <p><strong>Клиент:</strong> ${name}</p>
                <p><strong>Телефон:</strong> ${phone}</p>
            </div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #eee;">
                        <th style="border: 1px solid #000; padding: 8px; text-align: left;">Товар</th>
                        <th style="border: 1px solid #000; padding: 8px; text-align: center; width: 60px;">Кол-во</th>
                        <th style="border: 1px solid #000; padding: 8px; text-align: right; width: 130px;">Сумма</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRows}
                </tbody>
            </table>
            <div style="text-align: right; margin-top: 20px;">
                <p style="font-size: 18px; font-weight: bold;">ИТОГО: <span style="color: #d93025;">${total}</span></p>
            </div>
        </div>
    `;

    document.body.appendChild(printArea);

    const opt = {
        margin:       10,
        filename:     `Smeta_${name}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, logging: false, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // Даем браузеру 100мс на отрисовку скрытого блока, затем сохраняем
    setTimeout(() => {
        html2pdf().set(opt).from(printArea).save().then(() => {
            document.body.removeChild(printArea); // Удаляем временный блок после сохранения
        });
    }, 150);
}
