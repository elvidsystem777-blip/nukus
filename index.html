<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нукус Смета 2026</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .calc-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-update { background: #27ae60; color: white; padding: 15px; border: none; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-calc { background: #2980b9; color: white; padding: 15px; border: none; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #total-res { text-align: center; font-size: 24px; margin-top: 20px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Нукус Смета</h2>
    
    <button class="btn-update" onclick="syncData()">🔄 ОБНОВИТЬ ЦЕНЫ</button>
    
    <label>Выберите товар:</label>
    <select id="productList">
        <option value="0">-- Сначала обновите --</option>
    </select>
    
    <label>Количество:</label>
    <input type="number" id="qty" value="1" min="1">
    
    <button class="btn-calc" onclick="calculate()">РАССЧИТАТЬ</button>
    
    <div id="total-res">0 сум</div>
<script>
    // 1. Функция синхронизации с CRM
    async function syncData() {
        // Используем прямой путь к Product без знака #, как требует API
        const url = 'http://192.168.1.223:8080/crm/api/v1/cProduct?select=name,price';
        const key = '4436f4148eac8597be9f6d80afd244e5'; // Твой ключ для calc_user

        try {
            const response = await fetch(url, { 
                headers: { 'X-Api-Key': key } 
            });
            
            if (!response.ok) throw new Error('Ошибка сервера');

            const data = await response.json();
            const select = document.getElementById('productList');
            let optionsHtml = '';

            if (data.list && data.list.length > 0) {
                data.list.forEach(item => {
                    let price = parseFloat(item.price) || 0;
                    // Используем обратные кавычки  для формирования строки
                    optionsHtml += <option value="${price}">${item.name} (${price.toLocaleString()} сум)</option>`;
                });
                
                select.innerHTML = optionsHtml;
                // Сохраняем в память браузера, чтобы работало на Wi-Fi у торговых
                localStorage.setItem('nukus_cache', optionsHtml); 
                alert('База товаров успешно обновлена!');
            }
        } catch (e) {
            console.error(e);
            alert('Ошибка связи! Убедись, что ты в сети офиса и разрешила "Небезопасный контент" в браузере.');
        }
    }

    // 2. Функция расчета
    function calculate() {
        const select = document.getElementById('productList');
        const price = parseFloat(select.value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        
        const total = price * qty;
        document.getElementById('total-res').innerText = total.toLocaleString() + ' сум';
    }

    // 3. Автозагрузка при открытии страницы
    window.onload = () => {
        const savedData = localStorage.getItem('nukus_cache');
        if (savedData) {
            document.getElementById('productList').innerHTML = savedData;
        }
    };
</script>
</body>
</div>
</html>
