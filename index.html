<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELVID Смета 2026</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .calc-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-add { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add:active { background: #1e7e34; transform: scale(0.98); }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .res-table th, .res-table td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .total-box { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; text-align: right; }
        .total-val { font-size: 24px; font-weight: bold; color: #d93025; }
        .btn-reset { background: none; border: 1px solid #ccc; color: #999; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Смета ELVID</h2>
    
    <div class="row">
        <label>Выберите оборудование:</label>
        <select id="pSelect"></select>
    </div>

    <div class="row">
        <label>Количество (шт):</label>
        <input type="number" id="qInput" value="1" min="1">
    </div>

    <button class="btn-add" onclick="addItem()">➕ Добавить в смету</button>

    <table class="res-table">
        <thead>
            <tr><th>Товар</th><th>Кол-во</th><th>Сумма</th></tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div class="total-box">
        <div style="color: #1a73e8; font-size: 14px; font-weight: bold;">ИТОГО К ОПЛАТЕ:</div>
        <div class="total-val" id="finalSum">0 сум</div>
    </div>

    <button class="btn-reset" onclick="clearAll()">Очистить список</button>
</div>

<script>
    // ТЕСТОВЫЙ СПИСОК (сначала проверим работу кнопок)
    const products = [
        { name: "(BNC) Video and S-Video to VGA converter", price: 250000 },
        { name: "HDMI 1,5 m", price: 20000},
        { name: "HDMI 10 m", price: 110000},
        { name: "HDMI 15 m", price: 150000},
        { name: "HDMI 3 m", price: 30000},
        { name: "HDMI 5 m", price: 45000},
        { name: "HDMI extender 30 M (пассивный)", price:130000},
        { name: "HDMI extender 60 M (активный) HDTV-60 M", price:550000},
        { name: "HDMI splitter 1x2; 1080P 3D HDMI splitter ver 1,4", price:130000},
        { name: "VGA 1,5 m", price:20000},
        { name: "Аудиоколонки 3W-6W настенные", price:120000},
        { name: "Аудиоколонки 6W потолочный", price:120000},
        { name: "Аудиоколонки GOLDEN FALCON настенные", price:120000},
        { name: "Микрофон для усилителя; модель: YS-36", price:250000},
        { name: "Регулятор громкости 3W; Модель: M-602", price:80000},
        { name: "Усилители 150W; Модель: MP3-150U", price:2100000},
        { name: "AC/DC adapter 2A/12V; Model: 298-38; Блок питания уличный", price:70000},
        { name: "Блок питания 10А/12В металл, сеточный", price:110000},
        { name: "Блок питания 12В/5А пластмассовый. Смарт", price:70000},
        { name: "Блок питания 15А/12В металл, сеточный", price:150000},
        { name: "Блок питания 16А/12В металл, сеточный, корпус вытянутый тонкий", price:150000},
        { name: "Блок питания 2А/12В UPS; Модель: Ups-912", price:70000},
        { name: "Блок питания 5А/12В металл, сеточный", price:70000},
        { name: "IKS-2044BTH-PH/W Bullet-Turret; 4Mp; Wi-Fi Kit", price:1500000},
        // --- EZVIZ КАМЕРЫ ---
        { name: "IPC-T221HE-UC; 2 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая; Только с POE;", price:400000},
        { name: "IPC-T240H-U built-in microphone; 4 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая;", price:550000},
        { name: "IPC-T240HA LUC; 4 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая;", price:550000},
        { name: "IPC-T240HA LUF/SL; 4 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая; Двухсторонная связь; ColorVu; Smart Hybrid LIght; Детекция людей и транспорта", price:650000},
        { name: "IPC-T241H-UC; 4 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая;", price:550000},
        { name: "IPC-T260HA LUF/SL; 6 MP; 2,8 mm; ИК 30 М; Потолочная; Звуковая;", price:750000},
        { name: "IPC-T269HAD-LUF/SL; ColorVu; 6 MP; Потолочная; Звуковая; (180 поворотная)", price:1400000},
        // --- PTZ КАМЕРЫ (Поворотные) ---
        { name: "PTZ DS-2DE4425IW-DE; 4MP; Zoom 25x; ИК 100 м; Уличная", price: 4500000 },
        { name: "PTZ-N2204I-DE3; 2 MP; Zoom 4x4 ИК ; 20 м; Уличная", price: 1250000 },
        { name: "PTZ-N4225I-DE H; 2MP/25x", price: 4000000 },
        { name: "IKS-2044BPH-PH/W; 4MP; Wi-Fi Kit", price: 1700000 },
        // --- THD КАМЕРЫ ---
        { name: "DS-2CE56D0T-IPF; 1080 P; 2,8 мм; ИК 20 м; Потолочная; Hikvision; THC-T120-P", price: 260000 },
        { name: "THC-B110-P; 720P; 2,8 мм; ИК 20 м Уличная", price: 120000 },
        { name: "THC-B120-P; 1080P; 2,8 мм; ИК 20 м Уличная", price: 200000 },
        { name: "THC-B127-LPC; 2 MP; 2,8 мм; ИК-20 м; Led-подсветка; Уличная", price: 230000 },
        { name: "THC-B129-P; 1080P; ColorVu; 2,8 мм; ИК 20 м; Уличная", price: 300000 },
        { name: "THC-B220; 1080P; 2,8 мм; ИК 40 м; Уличная", price: 300000 },
        { name: "THC-T120-P; 1080P; 2,8 мм; Потолочная", price: 180000 },
        { name: "THC-T120-PC; 1080P; 2,8 мм; ИК 20 м; Потолочная", price: 200000 },
    ];

    let cart = [];

    // 1. Наполняем список при запуске
    function init() {
        const s = document.getElementById('pSelect');
        products.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.price;
            opt.text = item.name + " (" + item.price.toLocaleString() + " сум)";
            s.add(opt);
        });
    }

    // 2. Кнопка "Добавить"
    function addItem() {
        const s = document.getElementById('pSelect');
        const name = s.options[s.selectedIndex].text.split(" (")[0];
        const price = parseFloat(s.value);
        const qty = parseInt(document.getElementById('qInput').value) || 0;

        if (qty > 0) {
            cart.push({ n: name, q: qty, s: price * qty });
            render();
        }
    }

    // 3. Обновление таблицы
    function render() {
        const b = document.getElementById('resBody');
        let h = '', total = 0;
        cart.forEach(i => {
            h += "<tr><td>" + i.n + "</td><td>" + i.q + " шт.</td><td>" + i.s.toLocaleString() + " сум</td></tr>";
            total += i.s;
        });
        b.innerHTML = h;
        document.getElementById('finalSum').innerText = total.toLocaleString() + " сум";
    }
    // 4. Очистка
    function clearAll() {
        cart = [];
        render();
    }

    init();
</script>

</body>
</html>
