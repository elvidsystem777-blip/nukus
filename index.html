<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELVID Смета</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        
        /* Сайдбар */
        .sidebar { 
            width: 280px; 
            background: white; 
            border-right: 1px solid #ddd;
            height: 100vh;
            overflow-y: auto;
            position: sticky;
            top: 0;
        }
        .sidebar h3 { padding: 20px; margin: 0; background: #1a73e8; color: white; font-size: 18px; }
        .cat-item { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #eee; 
            transition: 0.3s;
            font-size: 14px;
        }
        .cat-item:hover { background: #e8f0fe; }
        .active { color: #1a73e8; font-weight: bold; border-left: 5px solid #1a73e8; background: #e8f0fe; }

        /* Основной контент */
        .main-content { flex-grow: 1; padding: 20px; display: flex; justify-content: center; }
        .calc-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; height: fit-content; }
        
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* Поиск */
        .search-box { margin-bottom: 10px; background: #fffbe6; border: 1px solid #ffe58f; }

        .btn-add { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-add:hover { background: #218838; }

        .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .res-table th, .res-table td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .total-box { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; text-align: right; }
        .total-val { font-size: 24px; font-weight: bold; color: #d93025; }
        
        .btn-reset { background: none; border: 1px solid #ccc; color: #999; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; display: block; margin-left: auto; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h3>Разделы</h3>
    </div>

<div class="main-content">
    <div class="calc-card">
        <h2>Смета ELVID</h2>
        
        <div class="row">
            <label>🔍 Поиск товара:</label>
            <input type="text" id="searchInput" placeholder="Введите название..." oninput="filterProducts()">
        </div>

        <div class="row">
            <label>Выберите оборудование:</label>
            <select id="pSelect"></select>
        </div>

        <div class="row">
            <label>Количество (шт):</label>
            <input type="number" id="qInput" value="1" min="1">
        </div>

        <button class="btn-add" onclick="addItem()">➕ Добавить в смету</button>

        <table class="res-table">
            <thead>
                <tr><th>Товар</th><th>Кол-во</th><th>Сумма</th></tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>

        <div class="total-box">
            <div style="color: #1a73e8; font-size: 14px; font-weight: bold;">ИТОГО К ОПЛАТЕ:</div>
            <div class="total-val" id="finalSum">0 сум</div>
        </div>

        <button class="btn-reset" onclick="clearAll()">Очистить список</button>
    </div>
</div>

<script>
    const catalog = {
        "HDMI и Удлинители": [
            { name: "(BNC) Video and S-Video to VGA converter", price: 250000 },
            { name: "HDMI 1,5 m", price: 20000},
            { name: "HDMI 10 m", price: 110000},
            { name: "HDMI 15 m", price: 150000},
            { name: "HDMI 3 m", price: 30000},
            { name: "HDMI 5 m", price: 45000},
            { name: "HDMI extender 30 M (пассивный)", price:130000},
            { name: "HDMI extender 60 M (активный) HDTV-60 M", price:550000},
            { name: "HDMI splitter 1x2; 1080P 3D HDMI splitter ver 1,4", price:130000},
            { name: "VGA 1,5 m", price:20000}
        ],
        "Аудио-Микрофоны": [
            { name: "Аудиоколонки 3W-6W настенные", price:120000},
            { name: "Аудиоколонки 6W потолочный", price:120000},
            { name: "Аудиоколонки GOLDEN FALCON настенные", price:120000},
            { name: "Микрофон для усилителя; YS-36", price:250000},
            { name: "Усилители 150W; MP3-150U", price:2100000}
        ],
        "Блоки питания": [
            { name: "AC/DC adapter 2A/12V; Блок питания уличный", price:70000},
            { name: "Блок питания 10А/12В металл", price:110000},
            { name: "Блок питания 12В/5А пластмассовый", price:70000},
            { name: "Блок питания 15А/12В металл", price:150000},
            { name: "Блок питания 2А/12В UPS", price:70000}
        ],
        "EZVIZ КАМЕРЫ": [
            { name: "EZVIZ C8C 1080; Colorvu", price: 750000 },
            { name: "EZVIZ CS-H5; 3Mp; 4G", price: 670000 },
            { name: "EZVIZ CS-H6C; Внутренняя", price: 450000 },
            { name: "EZVIZ H3C 1080 color", price: 600000 }
        ],
        "IPC КАМЕРЫ": [
            { name: "IPC-B120HA; 2 MP; ИК 30 м", price: 320000 },
            { name: "IPC-B129H; ColorVu; 2 MP", price: 550000 },
            { name: "IPC-B140H; 4 MP; Уличная", price: 550000 },
            { name: "IPC-D120H; Антивандальная", price: 350000 }
        ],
        "Домофоны": [
            { name: "DS-KH2220; Видеодомофон", price: 400000 },
            { name: "DS-KIS603-P; IP видеодомофон", price: 1800000 },
            { name: "БУЗ (Блок Управления Замком)", price: 50000 },
            { name: "Брелок Mifare", price: 10000 }
        ],
        "ЖЕСТКИЕ ДИСКИ HDD": [
            { name: "1 TB HDD", price: 750000 },
            { name: "2 TB HDD", price: 980000 },
            { name: "4 TB HDD", price: 1700000 }
        ],
        "МАТЕРИАЛЫ": [
            { name: "Pilot 1,8 м (Пилот)", price: 50000 },
            { name: "Герметичная коробка 15х15 см", price: 15000 },
            { name: "Изолента", price: 5000 },
            { name: "Гофра 20", price: 2000 }
        ]
    };

    let cart = [];
    let currentCategory = Object.keys(catalog)[0];

    // Отрисовка бокового меню
    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        Object.keys(catalog).forEach((cat, index) => {
            const div = document.createElement('div');
            div.className = 'cat-item' + (index === 0 ? ' active' : '');
            div.innerText = cat;
            div.onclick = () => {
                currentCategory = cat;
                document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                document.getElementById('searchInput').value = ''; // Сброс поиска
                updateProductList();
            };
            sidebar.appendChild(div);
        });
    }

    // Обновление списка товаров
    function updateProductList(filteredArr = null) {
        const pSelect = document.getElementById('pSelect');
        pSelect.innerHTML = '';
        const items = filteredArr || catalog[currentCategory];

        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.price;
            opt.dataset.name = item.name;
            opt.text = `${item.name} (${item.price.toLocaleString()} сум)`;
            pSelect.add(opt);
        });
    }

    // Фильтр поиска
    function filterProducts() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = catalog[currentCategory].filter(p => 
            p.name.toLowerCase().includes(term)
        );
        updateProductList(filtered);
    }

    // Добавление в корзину
    function addItem() {
        const s = document.getElementById('pSelect');
        if (s.options.length === 0) return;

        const name = s.options[s.selectedIndex].dataset.name;
        const price = parseFloat(s.value);
        const qty = parseInt(document.getElementById('qInput').value) || 0;

        if (qty > 0) {
            cart.push({ n: name, q: qty, s: price * qty });
            renderCart();
        }
    }

    // Отрисовка таблицы сметы
    function renderCart() {
        const b = document.getElementById('resBody');
        let h = '', total = 0;
        cart.forEach(i => {
            h += `<tr><td>${i.n}</td><td>${i.q} шт.</td><td>${i.s.toLocaleString()} сум</td></tr>`;
            total += i.s;
        });
        b.innerHTML = h;
        document.getElementById('finalSum').innerText = total.toLocaleString() + " сум";
    }

    function clearAll() {
        if(confirm("Очистить всю смету?")) {
            cart = [];
            renderCart();
        }
    }

    // Старт
    renderSidebar();
    updateProductList();
</script>

</body>
</html>
