<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELVID Смета 2026</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .calc-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-add { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add:active { background: #1e7e34; transform: scale(0.98); }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .res-table th, .res-table td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .total-box { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; text-align: right; }
        .total-val { font-size: 24px; font-weight: bold; color: #d93025; }
        .btn-reset { background: none; border: 1px solid #ccc; color: #999; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Смета ELVID</h2>
    
    <div class="row">
        <label>Выберите оборудование:</label>
        <select id="pSelect"></select>
    </div>

    <div class="row">
        <label>Количество (шт):</label>
        <input type="number" id="qInput" value="1" min="1">
    </div>

    <button class="btn-add" onclick="addItem()">➕ Добавить в смету</button>

    <table class="res-table">
        <thead>
            <tr><th>Товар</th><th>Кол-во</th><th>Сумма</th></tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div class="total-box">
        <div style="color: #1a73e8; font-size: 14px; font-weight: bold;">ИТОГО К ОПЛАТЕ:</div>
        <div class="total-val" id="finalSum">0 сум</div>
    </div>

    <button class="btn-reset" onclick="clearAll()">Очистить список</button>
</div>

<script>
    // ТЕСТОВЫЙ СПИСОК (сначала проверим работу кнопок)
    const products = [
        { name: "IPC-T320H-D; 2.8mm", price: 180000 },
        { name: "IPC-D121H; 2MP", price: 350000 },
        { name: "IPC-B660HA-LZ", price: 1730000 }
    ];

    let cart = [];

    // 1. Наполняем список при запуске
    function init() {
        const s = document.getElementById('pSelect');
        products.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.price;
            opt.text = item.name + " (" + item.price.toLocaleString() + " сум)";
            s.add(opt);
        });
    }

    // 2. Кнопка "Добавить"
    function addItem() {
        const s = document.getElementById('pSelect');
        const name = s.options[s.selectedIndex].text.split(" (")[0];
        const price = parseFloat(s.value);
        const qty = parseInt(document.getElementById('qInput').value) || 0;

        if (qty > 0) {
            cart.push({ n: name, q: qty, s: price * qty });
            render();
        }
    }

    // 3. Обновление таблицы
    function render() {
        const b = document.getElementById('resBody');
        let h = '', total = 0;
        cart.forEach(i => {
            h += "<tr><td>" + i.n + "</td><td>" + i.q + " шт.</td><td>" + i.s.toLocaleString() + " сум</td></tr>";
            total += i.s;
        });
        b.innerHTML = h;
        document.getElementById('finalSum').innerText = total.toLocaleString() + " сум";
    }
    // 4. Очистка
    function clearAll() {
        cart = [];
        render();
    }

    init();
</script>

</body>
</html>
